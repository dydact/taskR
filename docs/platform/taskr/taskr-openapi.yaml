openapi: 3.1.0
info:
  title: TaskR API
  version: 0.1.0
  description: |
    Draft OpenAPI specification for TaskR endpoints. Generated from docs/platform/taskr/api-reference.md.
servers:
  - url: https://{environment}.taskr.dydact.io/api
    variables:
      environment:
        default: staging
        enum: [dev, staging, prod]
  - url: https://{environment}.scr.dydact.io/scr/api
    description: scrAIv bridge endpoints
    variables:
      environment:
        default: staging
        enum: [dev, staging, prod]
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantId:
      name: x-tenant-id
      in: header
      required: true
      schema:
        type: string
    UserId:
      name: x-user-id
      in: header
      required: false
      schema:
        type: string
    ModelProfile:
      name: x-model-profile
      in: header
      required: false
      schema:
        type: string
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            detail:
              type: object
          required: [code, message]
    PaginatedMeta:
      type: object
      properties:
        page:
          type: integer
        perPage:
          type: integer
        total:
          type: integer
    Task:
      type: object
      properties:
        id:
          type: string
        list_id:
          type: string
        title:
          type: string
        status:
          type: string
        assignees:
          type: array
          items:
            type: string
        due_date:
          type: string
          format: date
        priority:
          type: string
        custom_fields:
          type: array
          items:
            type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, list_id, title, status, created_at, updated_at]
    TaskListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
    TaskRequest:
      type: object
      properties:
        list_id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
        assignees:
          type: array
          items:
            type: string
        due_date:
          type: string
          format: date
        priority:
          type: string
        custom_fields:
          type: array
          items:
            type: object
      required: [list_id, title]
paths:
  /tasks:
    get:
      summary: List tasks
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/UserId'
        - name: list_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: assignee
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create task
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tasks/{id}:
    get:
      summary: Get task detail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/UserId'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update task
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/UserId'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /spaces:
    get:
      summary: List spaces
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Space listing
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        slug:
                          type: string
                        color:
                          type: string
                        favorite:
                          type: boolean
                        counts:
                          type: object
                          properties:
                            tasks:
                              type: integer
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
  /analytics/status:
    get:
      summary: Status summary analytics
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/UserId'
        - name: space_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Status counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        status:
                          type: string
                        count:
                          type: integer
  /ai/jobs:
    get:
      summary: List AI jobs
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/UserId'
        - name: prompt_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: AI jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        prompt_id:
                          type: string
                        status:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        metadata:
                          type: object
  /notifications:
    get:
      summary: List notifications
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        message:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        read:
                          type: boolean
  /hr/timeclock/open:
    get:
      summary: HR proxy - open timeclock entries
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Open timeclock records
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        user_id:
                          type: string
                        started_at:
                          type: string
                          format: date-time
                        metadata:
                          type: object
