version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskr
      POSTGRES_USER: taskr
      POSTGRES_PASSWORD: taskr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "${TASKR_NATS_HOST_PORT:-14222}:4222"
      - "${TASKR_NATS_MONITOR_HOST_PORT:-8222}:8222"

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      TR_DATABASE_URL: postgresql://taskr:taskr@postgres:5432/taskr
      TR_REDIS_URL: redis://redis:6379/0
      TR_NATS_URL: nats://nats:4222
      TR_USE_TOOLFRONT: "true"
      TR_TOOLFRONT_REGISTRY_PATH: /app/toolfront-registry/providers.json
      TR_ROLLOUT_AUTOPILOT_ENABLED: "false"
      TR_ALLOWED_CORS_ORIGINS: '["https://localhost:5173","http://localhost:5173","https://127.0.0.1:5173","http://127.0.0.1:5173","https://localhost:5174","http://localhost:5174","https://127.0.0.1:5174","http://127.0.0.1:5174"]'
      TR_LOCAL_OPENAI_BASE_URL: http://${HOST_BRIDGE:-host.docker.internal}:8001
      TR_LOCAL_OPENAI_MODEL: ollama/qwen2.5:14b-instruct
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - nats

volumes:
  pgdata:
  miniodata:
